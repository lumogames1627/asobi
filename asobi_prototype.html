// ===== さがす =====
function baseFilter(){return plans.filter(function(p){
 if(p.host==='me')return false;
 if(p.day!==S.day)return false;
 if(isFull(p)&&!isJoined(p))return false;
 if(hasBlocked(p))return false;
 if(S.cat!=='all'&&p.cat!==S.cat)return false;
 if(S.sameOnly&&!p.p.every(function(x){return x[2]===S.gender}))return false;
 if(S.q&&p.title.indexOf(S.q)<0&&p.area.indexOf(S.q)<0)return false;
 return true;});}
function home(){
 var base=baseFilter();
 var inR=base.filter(function(p){return p.dist<=S.radius;});
 var usedR=S.radius,expanded=false;
 if(!inR.length&&base.length){
  for(var i=0;i<RADII.length;i++){var r=RADII[i][0];if(r>S.radius){var w=base.filter(function(p){return p.dist<=r;});if(w.length){inR=w;usedR=r;expanded=true;break;}}}
 }
 function favMatch(p){return S.tags.indexOf(p.cat)>=0;}
 var sorted=inR.slice().sort(function(a,b){return (soon(b)-soon(a))||(favMatch(b)-favMatch(a))||(a.dist-b.dist);});
 var list=sorted.length?sorted.map(function(p){var C=CATS[p.cat];
  return '<div class="card" onclick="openP('+p.id+')" style="cursor:pointer'+(soon(p)?';border-color:#FFC9A8':'')+'">'
  +'<div class="r">'+emoji(p)
  +'<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14.5px">'+p.title+(p.nb?' <span class="badge" style="background:rgba(47,169,124,.13);color:#2FA97C">初参加</span>':'')+offBadge(p)+sameGBadge(p)+'</div>'
  +'<div class="mut" style="margin-top:2px;font-size:12px"><b style="color:'+C.c+'">'+C.n+'</b>'+(favMatch(p)?' <span title="好きなカテゴリ">💗</span>':'')+(p.minAge==20?' <span style="font-size:10px;color:#B47A0B">20歳以上</span>':'')+(p.official?' ・ 日時・場所はチャットで相談 ・ '+p.area:' ・ '+p.time+'〜 ・ '+p.area+'（'+p.dist+'km）')+(p.day===DAYS7[0].k&&minsUntil(p.time)>0&&minsUntil(p.time)<=90?' ・ <b style="color:#FF7A45">まもなく</b>':'')+'</div></div></div>'
  +'<div class="sb" style="margin-top:11px"><span class="r" style="gap:6px">'+avs(p.p)+'<span class="mut" style="font-size:11px">👑'+(p.official?'asobi公式':p.p[0][0])+(p.p.length?' ・ '+p.p.map(function(x){return x[3].split(' ')[0]}).join('・'):' ・ まだ参加者なし')+'</span></span>'
  +(isJoined(p)?'<span class="badge" style="background:rgba(47,169,124,.13);color:#2FA97C">参加中</span>':(soon(p)?'<span class="badge soonb">あと1人</span>':'<span class="mut" style="font-weight:700">'+mc(p)+'/'+p.cap+'</span>'))+'</div></div>';
 }).join(''):'<div class="card" style="text-align:center;padding:30px 16px"><div style="font-size:30px">🌙</div><div style="font-weight:700;margin:10px 0 4px">この'+(S.q?'条件':'日')+'の予定はまだありません</div><div class="mut" style="margin-bottom:14px">予定を立てると、近くの人に表示されます</div>'+B('g','openCreate()','＋ 予定を立てる','width:auto;margin:0 auto;padding:10px 20px')+'</div>'
  +(S.q?'':wantCard());
 var exNote=expanded?'<div class="mut" style="margin:0 2px 8px;font-size:11px"><i class="ti ti-map-pin"></i> 近くに予定が少ないため、'+(usedR===999?'全国':usedR+'km')+'まで広げて表示しています</div>':'';
 var chips='<span class="pill '+(S.cat=='all'?'on':'')+'" onclick="S.cat=\'all\';render()">すべて</span>'
  +Object.keys(CATS).map(function(k){var C=CATS[k];var on=S.cat==k;
   return '<span class="pill'+(on?' on':'')+'" style="'+(on?'background:'+C.c+';color:#fff':'')+'" onclick="S.cat=\''+k+'\';render()">'+C.e+' '+C.n+'</span>';}).join('');
 var dchips=dtiles(S.day,'S.day');
 var rl=RADII.filter(function(r){return r[0]===S.radius})[0];
 return '<div class="sb"><div class="tt">さがす</div><span class="r" style="gap:12px"><i class="ti ti-search" style="font-size:18px;color:#A79B84;cursor:pointer" onclick="S.showSearch=!S.showSearch;if(!S.showSearch){S.q=\'\';}render()"></i><span class="mut" style="cursor:pointer" onclick="sheet(\'radius\')"><i class="ti ti-current-location"></i> '+rl[1]+(S.sameOnly?' ・同性のみ':'')+' <i class="ti ti-chevron-down" style="font-size:11px"></i></span></span></div>'
 +(S.showSearch?'<div class="r" style="margin-top:10px;gap:8px"><input class="inp" id="qin" style="padding:9px 12px;font-size:13px" placeholder="タイトル・駅名で検索してEnter" value="'+S.q+'" onkeydown="if(event.key===\'Enter\'){S.q=clean(this.value.trim());render()}">'+(S.q?'<span class="lk" style="flex:none" onclick="S.q=\'\';render()">解除</span>':'')+'</div>':'')
 +'<div style="margin:12px 0 2px;white-space:nowrap;overflow-x:auto;scrollbar-width:none">'+dchips+'</div>'
 +'<div style="margin:0 0 6px;white-space:nowrap;overflow-x:auto;scrollbar-width:none">'+chips+'</div>'+exNote+list;}

function detail(){var p=cur;var C=CATS[p.cat];var age=calcAge();
 var joinedP=isJoined(p),full=isFull(p),liked=S.bmk.indexOf(p.id)>=0,blk=hasBlocked(p);
 var cta;
 if(joinedP){cta=(mc(p)>=3?B('','openChatFor('+p.id+')','グループチャットへ'):B('g','leaveJoin()','参加を取り消す'));}
 else if(blk){cta='<div class="btn dis">参加できません（ブロック中の相手がいます）</div>';}
 else if(full){cta='<div class="btn dis">満員です</div>';}
 else{cta=B('','joinPress()','この予定に参加する');}
 var quota='';
 if(!joinedP&&!full&&!blk){
  if(p.official)quota='<div class="mut" style="text-align:center;margin-top:10px;font-size:11px">公式企画への参加は無料参加枠を消費しません</div>';
  else if(!S.premium)quota='<div class="mut" style="text-align:center;margin-top:10px;font-size:11px">今月の無料参加 残り'+Math.max(0,S.limit-S.used)+'回'+(S.tickets?' ＋ チケット'+S.tickets+'枚':'')+' ・ 不成立なら回数は戻ります</div>';

  +B('rd','cancelHost('+S.cancelId+')','取り消す')+B('g','closeSheet()','戻る','margin-top:10px'));}
 if(S.sheet==='pubconfirm'&&S.cCat){var C=CATS[S.cCat];
  return sheetWrap('この内容で公開しますか？','<div class="mut" style="line-height:2;padding:2px 2px 10px">'
  +C.e+' '+C.n+' ・ '+(S.cTitle||C.n+'行ける人募集')+'<br>'
  +dayLabel(S.cDay)+' '+S.cTime+'〜（'+S.cDur+'）<br>'
  +S.cArea+(S.cMemo?' / '+S.cMemo:'')+' ・ '+S.cCap+'人'+(S.cSameG?' ・ 同性のみ':'')+'</div>'
  +B('','publishGo()','公開する')+B('g','closeSheet()','修正する','margin-top:10px'));}
 if(S.sheet==='rematch'){var p=S.mychat;if(!p)return '';
  var days=dtiles(S.rmDay,'S.rmDay',DAYS7.slice(1,5));
  var times=['19:00','20:00','21:00'].map(function(t){return '<span class="pill '+(S.rmTime===t?'on':'')+'" onclick="S.rmTime=\''+t+'\';render()">'+t+'</span>';}).join('');
  return sheetWrap('このメンバーでまた遊ぶ','<div class="mut" style="padding:2px 2px 10px">メンバーはそのまま、次の予定を決めます</div>'
  +'<div class="mut" style="margin-bottom:4px;font-size:11px">日付</div><div>'+days+'</div>'
  +'<div class="mut" style="margin:6px 0 4px;font-size:11px">時間</div><div style="margin-bottom:10px">'+times+'</div>'
  +B('','rematchGo()','この日程で決める')+B('g','closeSheet()','やめる','margin-top:10px'));}
 if(S.sheet==='logout'){
  return sheetWrap('ログアウトしますか？',B('rd','doLogout()','ログアウト')+B('g','closeSheet()','戻る','margin-top:10px'));}
 if(S.sheet==='quit'){
  return sheetWrap('退会しますか？','<div class="mut" style="padding:2px 2px 12px">アカウントとプロフィールは削除されます。安全対応のため、通報に関する記録は法令の範囲で一定期間保全されます。</div>'
  +B('rd','doLogout()','退会する')+B('g','closeSheet()','戻る','margin-top:10px'));}
 return '';}
function sheetWrap(t,b){return '<div class="bd0" onclick="closeSheet()"></div><div class="sheet">'+(t?'<div style="font-weight:700;margin-bottom:8px">'+t+'</div>':'')+b+'</div>';}
// ログアウト/退会 = セッション状態を完全破棄（メモリ内デモなのでリロードで実現）
function doLogout(){location.replace(location.pathname+location.search);}
function rematchGo(){var p=S.mychat;if(!p)return;
 p.day=S.rmDay;p.time=S.rmTime;p.meet=false;p.rated=false;p.rmap=null;
 p.msgs.push(['sys','次の予定: '+dayLabel(p.day)+' '+p.time+' '+p.area+'（メンバーはそのまま）']);
 S.sheet=null;toast('次の予定が決まりました');openChat();}

// ===== ナビ・描画 =====
var TABS=['home','chats','mypage'];
function tabbar(){var ic={home:['ti-search','さがす'],chats:['ti-message-circle','やりとり'],mypage:['ti-user','マイページ']};
 return '<div class="tabbar">'+tabItem('home',ic.home)+tabItem('chats',ic.chats)+tabItem('mypage',ic.mypage)+'</div>';}
function tabItem(t,x){var dot=(t=='chats')&&plans.some(function(p){return isJoined(p)&&mc(p)>=3&&!p.ended});
 return '<div class="tab '+(S.tab===t&&isTab()?'on':'')+'" onclick="goTab(\''+t+'\')">'+(dot?'<span class="nd"></span>':'')+'<i class="ti '+x[0]+'"></i>'+x[1]+'</div>';}
function isTab(){return TABS.indexOf(S.screen)>=0;}
var screens={welcome:welcome,ag_email:ag_email,ag_code:ag_code,ag_profile:ag_profile,ag_tags:ag_tags,ag_perms:ag_perms,terms:terms,privacy:privacy,promo:promo,
 home:home,detail:detail,joined:joined,matched:matched,agedeny:agedeny,samedeny:samedeny,quota:quota,chat:chat,share:share,sos:sos,
 rate:rate,ratebad:ratebad,thanks:thanks,preport:preport,reportdone:reportdone,
 create:create,created:created,chats:chats,host_manage:host_manage,
 mypage:mypage,profile_edit:profile_edit,set_account:set_account,set_badge:set_badge,set_notif:set_notif,set_privacy:set_privacy,set_safety:set_safety,help:help,history:history,notifs:notifs,guidelines:guidelines,premium:premium,premium_done:premium_done};
function render(){var html='<div class="bar"><span>'+NOW+'</span><span style="font-family:\'M PLUS Rounded 1c\',sans-serif;font-weight:800;letter-spacing:.5px">asobi<span style="color:#FF7A45">.</span></span><span><i class="ti ti-wifi"></i> <i class="ti ti-battery-3"></i></span></div>';
 html+='<div class="scr" '+(isTab()?'style="padding-bottom:4px"':'')+'>'+(screens[S.screen]||welcome)()+'</div>';
 if(isTab())html+=tabbar();
 if(S.screen==='home'&&!S.sheet)html+='<div role="button" tabindex="0" onkeydown="if(event.key===\'Enter\'){this.click()}" onclick="openCreate()" style="position:absolute;left:16px;bottom:78px;display:flex;align-items:center;gap:6px;background:#FF7A45;color:#fff;font-weight:700;font-size:13.5px;padding:13px 18px;border-radius:999px;cursor:pointer;box-shadow:0 8px 20px rgba(255,122,69,.35);z-index:4"><i class="ti ti-plus" style="font-size:17px"></i>予定を立てる</div>';
 if(S.sheet)html+=SHEETS();
 if(S.toast)html+='<div class="toast">'+S.toast+'</div>';
 document.getElementById('ph').innerHTML=html;}
function go(s){S.sheet=null;S.screen=s;render();}
function goTab(t){S.sheet=null;S.tab=t;S.screen=t;render();}
function sheet(s){S.sheet=s;render();}
function closeSheet(){S.sheet=null;render();}
function openP(id){cur=plans.filter(function(p){return p.id==id})[0];if(cur)go('detail');}
function fill(key,btn){S[key]=['4','8','2','9','1','6'];render();var b=document.getElementById(btn);if(b){b.style.opacity='1';b.style.pointerEvents='auto';}}
function upd(){var b=document.getElementById('rsend');if(!b)return;var ok=S.rcat&&S.rtxt&&S.rtxt.trim().length>0;b.style.opacity=ok?'1':'.4';b.style.pointerEvents=ok?'auto':'none';}
function updOther(){var b=document.getElementById('ratebadbtn');if(!b)return;var ok=S.rtags.length&&(S.rOther&&S.rOther.trim().length>0);b.style.opacity=ok?'1':'.45';b.style.pointerEvents=ok?'auto':'none';}
function tgTag(t){var i=S.rtags.indexOf(t);if(i<0)S.rtags.push(t);else S.rtags.splice(i,1);render();}
function toast(m){S.toast=m;render();setTimeout(function(){S.toast=null;render();},1700);}
// 写真CDNが読めない環境向けフォールバック
window.addEventListener('error',function(e){var t=e.target;
 if(t&&t.tagName==='IMG'&&(' '+t.className+' ').indexOf(' ava ')>=0){
  var s=document.createElement('span');s.className='ava';
  s.setAttribute('style',t.getAttribute('style')||'');s.style.background='#B0A38B';s.textContent='?';
  if(t.parentNode)t.parentNode.replaceChild(s,t);}},true);
// デモ用: #home 等のハッシュで認証をスキップして任意画面へ
if(location.hash){var h=location.hash.substring(1);
 if(!S.photo)S.photo=PT+(S.gender==='f'?'women':'men')+'/75.jpg';
 if(!S.tags.length)S.tags=['nomi','karaoke'];
 if(!S.seeded){plans.push({id:99,cat:'cafe',title:'新作スイーツ開拓',area:'新宿駅',dist:2.5,day:'7/3',time:'20:00',dur:'約1時間',cap:3,likes:2,p:[[S.name,S.myc,S.gender,myLabel(),S.photo,S.tags.slice(),null,'me','host']],host:'me'});S.seeded=true;}
 if(TABS.indexOf(h)>=0){S.tab=h;S.screen=h;}else if(screens[h]){S.screen=h;}}
render();
</script>
